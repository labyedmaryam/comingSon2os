<!DOCTYPE html>
<html lang="fr" class="scroll-smooth m-0 p-0">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Demandez un devis gratuit — Omega Outsourcing Service (2OS), bureau d'étude technique à Casablanca. Structure, VRD, fondations et études techniques." />
  <meta name="keywords" content="demande de devis, Omega Outsourcing Service, 2OS, bureau d'étude technique, Casablanca, devis structure, VRD, fondations, études techniques, Maroc" />
  <title>Demande de devis · Omega Outsourcing Service</title>
  <link rel="icon" href="assets/favicon.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="assets/logo.png" type="image/png" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Plus Jakarta Sans", "system-ui", "sans-serif"] },
          colors: {
            brand: {
              green: "#8fb01f",
              "green-light": "#eef4d9",
              wine: "#7a2035",
              "wine-light": "#f9eef1",
              cream: "#f8faf4",
            },
          },
          animation: {
            "fade-up": "fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards",
          },
          keyframes: {
            fadeUp: {
              from: { opacity: "0", transform: "translateY(16px)" },
              to: { opacity: "1", transform: "translateY(0)" },
            },
          },
        },
      },
    };
  </script>
  <script id="contact-config" type="application/json">
  {
    "adresse": "Angle Bd Noukawama et Med VI, Résidence El Baida I",
    "ville": "2ème étage, App 212, Casablanca",
    "email": "maryamlabyed2002@gmail.com",
    "telephone2": "06 44 91 37 60"
  }
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }
    .bg-cover-img {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .img-page-bg {
      background-image: url("https://images.unsplash.com/photo-1541888946425-d81bb19240f5?auto=format&fit=crop&w=1920&q=85");
    }
    .logo-header {
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.12));
    }
    .nav-bar {
      position: relative;
      z-index: 10;
      margin: 0;
      padding: 0;
      background: transparent;
    }
    .nav-brand-wine {
      color: #7a2035;
    }
    .nav-brand-green {
      color: #8fb01f;
    }
    .nav-link {
      color: #7a2035;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.25s ease, opacity 0.25s ease;
    }
    .nav-link:hover {
      color: #8fb01f;
      opacity: 0.9;
    }
    .card-light {
      border: 1px solid rgba(122, 32, 53, 0.12);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 20px rgba(122, 32, 53, 0.06);
    }
    .input-light {
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .input-light:focus,
    .input-light:focus-visible {
      border-color: #8fb01f;
      outline: none;
      box-shadow: 0 0 0 3px rgba(161, 191, 23, 0.28);
    }
    .btn-brand {
      background: #8fb01f;
      color: #fff;
      box-shadow: 0 4px 12px rgba(143, 176, 31, 0.3);
      transition: background-color 0.3s ease, transform 0.25s ease, box-shadow 0.3s ease;
    }
    .btn-brand:hover:not(:disabled) {
      background: #7a9919;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(143, 176, 31, 0.45);
    }
    .btn-brand:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 3px 10px rgba(143, 176, 31, 0.35);
    }
    .page-overlay {
      background: linear-gradient(180deg, rgba(248, 250, 244, 0.92) 0%, rgba(255, 255, 255, 0.85) 50%, rgba(244, 247, 238, 0.93) 100%);
    }
    [x-cloak] {
      display: none !important;
    }
  </style>
</head>
<body class="m-0 min-h-dvh overflow-x-hidden bg-brand-cream p-0 font-sans antialiased text-slate-700">

  <div class="pointer-events-none fixed inset-0 z-0 overflow-hidden" aria-hidden="true">
    <div class="bg-cover-img img-page-bg absolute inset-0 scale-105 bg-fixed bg-center opacity-40"></div>
    <div class="page-overlay absolute inset-0"></div>
  </div>

  <nav class="nav-bar w-full pt-0 pb-0" aria-label="Navigation principale">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 pt-0 pb-0 sm:px-6">
      <a href="index.html" class="flex min-w-0 items-center gap-3">
        <img
          src="assets/logo.png"
          alt="Logo Omega Outsourcing Service (2OS) — symbole de poignée de main ailée, bureau d'étude technique à Casablanca"
          width="128"
          height="128"
          class="logo-header h-20 w-20 shrink-0 object-contain transition hover:opacity-90 sm:h-24 sm:w-24 md:h-28 md:w-28 lg:h-32 lg:w-32"
        />
        <span class="hidden min-w-0 sm:block">
          <span class="nav-brand-wine block truncate text-sm font-bold leading-tight">
            <span class="nav-brand-green">O</span>mega
            <span class="nav-brand-green"> O</span>utsourcing
            <span class="nav-brand-green"> S</span>ervice
          </span>
          <span class="nav-brand-green block text-[0.65rem] font-semibold lowercase tracking-wide">
            <span class="nav-brand-wine">b</span>ureau<span class="nav-brand-wine"> d'</span>étude<span class="nav-brand-wine"> t</span>echnique
          </span>
        </span>
      </a>
      <a href="index.html" class="nav-link shrink-0 sm:text-sm">Accueil</a>
    </div>
  </nav>

  <div x-data="contactInfo" class="relative z-10 mx-auto flex min-h-dvh max-w-7xl flex-col px-4 pt-0 pb-6 sm:px-6 sm:pb-8 md:px-8 lg:pb-10">

    <main class="motion-safe:animate-fade-up mx-auto w-full max-w-3xl flex-1">
      <div class="mb-6 sm:mb-8">
        <p class="mb-3 inline-flex items-center gap-2 rounded-full border border-brand-green/30 bg-brand-green-light px-3 py-1.5 text-xs font-semibold uppercase tracking-wide text-brand-green">
          Devis gratuit
        </p>
        <h1 class="mb-2 text-2xl font-bold text-slate-800 sm:text-3xl md:text-4xl">Demande de <span class="text-brand-green">devis</span></h1>
        <p class="max-w-xl text-sm text-slate-600 sm:text-base">
          Décrivez votre projet — études techniques, structure, VRD ou fondations. Réponse sous 24 heures.
        </p>
      </div>

      <div
        x-data="ajaxForm({
          successMessage: 'Demande de devis envoyée. Merci — nous vous répondons sous 24 h.',
          submitBusyLabel: 'Envoi en cours…'
        })"
        class="card-light rounded-2xl p-5 sm:p-6 md:p-7"
      >
        <form
          id="devis-form"
          class="space-y-4"
          novalidate
          @submit.prevent="onSubmit($event)"
          @htmx:after-request="onHtmxAfterRequest($event)"
        >
          <input type="hidden" name="_subject" value="Demande de devis — Omega Outsourcing Service" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="text" name="_honey" class="hidden" tabindex="-1" autocomplete="off" />

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div class="flex flex-col gap-1.5">
              <label for="nom" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Nom</label>
              <input type="text" id="nom" name="nom" required placeholder="Nom" autocomplete="family-name"
                class="input-light w-full rounded-lg border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 sm:text-base" />
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="prenom" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Prénom</label>
              <input type="text" id="prenom" name="prenom" required placeholder="Prénom" autocomplete="given-name"
                class="input-light w-full rounded-lg border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 sm:text-base" />
            </div>
          </div>

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div class="flex flex-col gap-1.5">
              <label for="email" class="text-xs font-semibold uppercase tracking-wider text-slate-500">E-mail</label>
              <input type="email" id="email" name="email" required placeholder="Mail" autocomplete="email"
                class="input-light w-full rounded-lg border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 sm:text-base" />
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="tel" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Téléphone</label>
              <input type="tel" id="tel" name="telephone" required placeholder="Téléphone" autocomplete="tel"
                class="input-light w-full rounded-lg border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 sm:text-base" />
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="societe" class="text-xs font-semibold uppercase tracking-wider text-slate-500">
              Société <span class="font-normal normal-case text-slate-400">(facultatif)</span>
            </label>
            <input type="text" id="societe" name="societe" placeholder="Nom de votre entreprise" autocomplete="organization"
              class="input-light w-full rounded-lg border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 sm:text-base" />
          </div>

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div class="flex flex-col gap-1.5">
              <label for="prestation" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Type de prestation</label>
              <select id="prestation" name="prestation" required
                class="input-light w-full rounded-lg border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 outline-none transition sm:text-base">
                <option value="" disabled selected>Sélectionnez</option>
                <option value="Études techniques">Études techniques</option>
                <option value="Structure">Structure</option>
                <option value="VRD">VRD</option>
                <option value="Fondations">Fondations</option>
                <option value="Autre">Autre</option>
              </select>
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="localisation" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Localisation du projet</label>
              <input type="text" id="localisation" name="localisation" required placeholder="Ville ou région" autocomplete="address-level2"
                class="input-light w-full rounded-lg border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 sm:text-base" />
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="description" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Description du projet</label>
            <textarea id="description" name="description" required rows="5" placeholder="Nature du projet, surface, délais souhaités, documents disponibles…"
              class="input-light min-h-[120px] w-full resize-y rounded-lg border border-slate-200 bg-white px-3.5 py-2.5 text-sm text-slate-800 outline-none transition placeholder:text-slate-400 sm:text-base"></textarea>
          </div>

          <p
            x-show="feedbackVisible"
            x-cloak
            :class="feedbackClass"
            x-text="feedbackText"
            role="alert"
            aria-live="polite"
            class="rounded-lg px-3 py-2.5 text-center text-sm"
          ></p>

          <button
            type="submit"
            id="btn-submit"
            :disabled="submitting"
            class="btn-brand flex w-full items-center justify-center gap-2 rounded-lg px-4 py-3 text-sm font-semibold transition disabled:opacity-50 sm:text-base"
          >
            <span x-show="!submitting" class="inline-flex items-center justify-center gap-2">
              Demander un devis
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </span>
            <span x-show="submitting" x-cloak x-text="submitBusyLabel"></span>
          </button>
        </form>
      </div>
    </main>

    <footer class="mt-10 flex justify-center border-t border-brand-wine/10 pt-6 text-xs text-slate-500 sm:mt-12">
      <span>&copy; <span x-text="year"></span> Omega Outsourcing Service</span>
    </footer>
  </div>

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="assets/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
</body>
</html>
